<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MyCalls Operational Dashboard</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="../styles.css" />
    <script>
      window.__MYCALLS_BOOT__ = { started: false, ready: false, error: null };
      window.__MYCALLS_PAGE__ = {
        locale: "en",
        fallbackTitle: "MyCalls Dashboard could not start",
        fallbackMessage:
          "This dashboard must run through the shared MyCalls server, not file://. Open it through the Node server at http://localhost:4173/en/.",
        fallbackPrefix: "Dashboard boot failed. Run it through the shared MyCalls server.",
        localServerCommand: "npm start",
        localServerHint: "Then open http://localhost:4173/en/",
      };
      document.documentElement.classList.add("app-pending");
    </script>
  </head>
  <body>
    <div class="app-fallback hidden" id="app-fallback">
      <div class="fallback-card">
        <p class="eyebrow">Runtime Check</p>
        <h1 id="fallback-title">MyCalls Dashboard could not start</h1>
        <p id="fallback-message">
          This dashboard must run through the shared MyCalls server, not file://.
        </p>
        <div class="fallback-actions">
          <code id="fallback-command">npm start</code>
          <span id="fallback-hint">Then open http://localhost:4173/en/</span>
        </div>
      </div>
    </div>

    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark" id="brand-mark">MC</div>
          <div>
            <p class="eyebrow" id="brand-eyebrow">Revenue Engine</p>
            <h1 id="product-name">MyCalls</h1>
          </div>
        </div>

        <nav class="nav" id="main-nav"></nav>


      </aside>

      <main class="main">
        <header class="topbar">
          <div>
            <p class="eyebrow" id="topbar-eyebrow">Operational Dashboard</p>
            <h2 id="screen-title">Executive Focus</h2>
          </div>
          <div class="topbar-utility">
            <div class="topbar-actions" id="screen-actions"></div>
            <a href="../ar/" class="icon-button lang-toggle" title="Switch to Arabic">🌐 ع</a>
          </div>
        </header>

        <section class="filters" id="global-filters"></section>

        <section class="content" id="screen-content"></section>
      </main>
    </div>

    <div class="drawer-backdrop hidden" id="drawer-backdrop"></div>
    <aside class="drawer hidden" id="drawer">
      <div class="drawer-header">
        <div>
          <p class="eyebrow" id="drawer-kicker">Details</p>
          <h3 id="drawer-title">Record</h3>
        </div>
        <button class="icon-button" id="drawer-close" type="button" aria-label="Close drawer">
          ✕
        </button>
      </div>
      <div class="drawer-body" id="drawer-body"></div>
    </aside>

    <script>
      (async function bootMyCalls() {
        const page = window.__MYCALLS_PAGE__;
        const fallback = document.getElementById("app-fallback");
        const fallbackTitle = document.getElementById("fallback-title");
        const fallbackMessage = document.getElementById("fallback-message");
        const fallbackCommand = document.getElementById("fallback-command");
        const fallbackHint = document.getElementById("fallback-hint");

        function showFallback(message) {
          window.__MYCALLS_BOOT__.error = message;
          document.documentElement.classList.remove("app-pending");
          document.documentElement.classList.add("app-failed");
          fallback.classList.remove("hidden");
          fallbackTitle.textContent = page.fallbackTitle;
          fallbackMessage.textContent = message;
          fallbackCommand.textContent = page.localServerCommand;
          fallbackCommand.classList.toggle("hidden", !page.localServerCommand);
          fallbackHint.textContent = page.localServerHint;
        }

        if (window.location.protocol === "file:") {
          showFallback(page.fallbackMessage);
          return;
        }

        try {
          window.__MYCALLS_BOOT__.started = true;
          const [{ getLocaleConfig }, app] = await Promise.all([
            import("../i18n.mjs"),
            import("../app.js"),
          ]);
          await app.bootstrapApp({
            locale: page.locale,
            localeConfig: getLocaleConfig(page.locale),
          });
          window.__MYCALLS_BOOT__.ready = true;
          document.documentElement.classList.remove("app-pending");
          document.documentElement.classList.add("app-ready");
        } catch (error) {
          showFallback(`${page.fallbackPrefix} Technical detail: ${error.message}`);
        }
      })();
    </script>
  </body>
</html>
