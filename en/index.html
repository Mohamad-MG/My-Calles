<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MyCalls</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="../app/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="app-sidebar">
        <div class="app-brand">
          <div class="app-brand-mark" id="app-brand-mark">MC</div>
          <div class="app-brand-copy">
            <p id="app-product-subtitle">Channel operations</p>
            <h1 id="app-product-name">MyCalls</h1>
          </div>
        </div>
        <nav class="app-nav" id="app-nav"></nav>
      </aside>
      <main class="app-main">
        <header class="app-topbar">
          <div>
            <p class="app-kicker">Workspace</p>
            <h2 id="app-screen-title">Home</h2>
          </div>
          <div class="app-topbar-actions">
            <a class="app-lang-switch" id="app-locale-switch" href="../ar/">AR</a>
          </div>
        </header>
        <section id="app-content"></section>
      </main>
    </div>
    <div class="app-drawer-backdrop hidden" id="app-drawer-backdrop"></div>
    <aside class="app-drawer hidden" id="app-drawer">
      <div class="app-drawer-header">
        <h3 id="app-drawer-title">Details</h3>
        <button class="app-button ghost" id="app-drawer-close" type="button">Close</button>
      </div>
      <div class="app-drawer-body" id="app-drawer-body"></div>
    </aside>
    <script type="module">
      import { bootstrapApp } from "../app/app.mjs";
      await bootstrapApp({ locale: "en", screenKey: "home" });
    </script>
  </body>
</html>
