<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MyCalls Operational Dashboard</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="../styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark" id="brand-mark">MC</div>
          <div>
            <p class="eyebrow" id="brand-eyebrow">Revenue Engine</p>
            <h1 id="product-name">MyCalls</h1>
          </div>
        </div>

        <div class="sidebar-section">
          <p class="sidebar-section-label">Navigation</p>
          <nav class="nav" id="main-nav"></nav>
        </div>

        <section class="sidebar-panel system-panel">
          <div class="sidebar-panel-head">
            <p class="panel-label" id="sidebar-weekly-label">Weekly Focus</p>
            <span class="sidebar-panel-tag">LIVE</span>
          </div>
          <div id="sidebar-weekly-focus"></div>
        </section>

        <section class="sidebar-panel system-panel">
          <div class="sidebar-panel-head">
            <p class="panel-label" id="sidebar-rules-label">Operating Rules</p>
          </div>
          <ul class="rules-list" id="rules-list"></ul>
        </section>
      </aside>

      <main class="main">
        <header class="topbar">
          <div>
            <p class="eyebrow" id="topbar-eyebrow">Operational Dashboard</p>
            <h2 id="screen-title">Executive Focus</h2>
          </div>
          <div class="topbar-utility">
            <div class="topbar-actions" id="screen-actions"></div>
            <a href="../ar/" class="icon-button lang-toggle" title="Switch to Arabic">AR</a>
          </div>
        </header>

        <section class="filters" id="global-filters"></section>

        <section class="content" id="screen-content"></section>
      </main>
    </div>

    <div class="drawer-backdrop hidden" id="drawer-backdrop"></div>
    <aside class="drawer hidden" id="drawer">
      <div class="drawer-header">
        <div>
          <p class="eyebrow" id="drawer-kicker">Details</p>
          <h3 id="drawer-title">Record</h3>
        </div>
        <button class="icon-button" id="drawer-close" type="button" aria-label="Close drawer">
          ✕
        </button>
      </div>
      <div class="drawer-body" id="drawer-body"></div>
    </aside>

    <script type="module">
      import { getLocaleConfig } from "../i18n.mjs";
      import * as app from "../app.js";
      try {
        await app.bootstrapApp({
          locale: "en",
          localeConfig: getLocaleConfig("en"),
        });
      } catch (error) {
        document.body.innerHTML = `<div style="padding:32px;font-family:sans-serif"><h1>Error</h1><p>${error.message}</p></div>`;
      }
    </script>
  </body>
</html>
