<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>لوحة تشغيل ماي كولز</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="../styles.css" />
    <script>
      window.__MYCALLS_BOOT__ = { started: false, ready: false, error: null };
      window.__MYCALLS_PAGE__ = {
        locale: "ar",
        fallbackTitle: "تعذر تشغيل لوحة ماي كولز",
        fallbackMessage:
          "هذه اللوحة لا تعمل عند فتح الملف مباشرة. افتحها من صفحات جيت هب أو من رابط محلي.",
        fallbackPrefix: "فشل تشغيل اللوحة. شغّلها من صفحات جيت هب أو من رابط محلي.",
        localServerCommand: "",
        localServerHint: "افتح اللوحة من صفحات جيت هب أو من رابط محلي.",
      };
      document.documentElement.classList.add("app-pending");
    </script>
  </head>
  <body>
    <div class="app-fallback hidden" id="app-fallback">
      <div class="fallback-card">
        <p class="eyebrow">فحص التشغيل</p>
        <h1 id="fallback-title">تعذر تشغيل لوحة ماي كولز</h1>
        <p id="fallback-message">
          هذه اللوحة لا تعمل عند فتح الملف مباشرة. افتحها من صفحات جيت هب أو من رابط محلي.
        </p>
        <div class="fallback-actions">
          <code id="fallback-command" class="hidden"></code>
          <span id="fallback-hint">افتح اللوحة من صفحات جيت هب أو من رابط محلي.</span>
        </div>
      </div>
    </div>

    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark" id="brand-mark">مك</div>
          <div>
            <p class="eyebrow" id="brand-eyebrow">محرك الإيراد</p>
            <h1 id="product-name">ماي كولز</h1>
          </div>
        </div>

        <nav class="nav" id="main-nav"></nav>

        <section class="sidebar-panel">
          <p class="panel-label" id="sidebar-weekly-label">التركيز الأسبوعي</p>
          <div id="sidebar-weekly-focus"></div>
        </section>

        <section class="sidebar-panel">
          <p class="panel-label" id="sidebar-rules-label">قواعد التشغيل</p>
          <ul class="rules-list" id="rules-list"></ul>
        </section>
      </aside>

      <main class="main">
        <header class="topbar">
          <div>
            <p class="eyebrow" id="topbar-eyebrow">لوحة تشغيلية</p>
            <h2 id="screen-title">التركيز التنفيذي</h2>
          </div>
          <div style="display: flex; gap: 12px; align-items: center;">
            <div class="topbar-actions" id="screen-actions"></div>
            <a href="../en/" class="icon-button lang-toggle" style="text-decoration: none; font-family: 'Outfit', sans-serif; font-weight: 500;" title="Switch to English">🌐 EN</a>
          </div>
        </header>

        <section class="filters" id="global-filters"></section>

        <section class="content" id="screen-content"></section>
      </main>
    </div>

    <div class="drawer-backdrop hidden" id="drawer-backdrop"></div>
    <aside class="drawer hidden" id="drawer">
      <div class="drawer-header">
        <div>
          <p class="eyebrow" id="drawer-kicker">التفاصيل</p>
          <h3 id="drawer-title">سجل</h3>
        </div>
        <button class="icon-button" id="drawer-close" type="button" aria-label="إغلاق اللوحة">
          ✕
        </button>
      </div>
      <div class="drawer-body" id="drawer-body"></div>
    </aside>

    <script>
      (async function bootMyCalls() {
        const page = window.__MYCALLS_PAGE__;
        const fallback = document.getElementById("app-fallback");
        const fallbackTitle = document.getElementById("fallback-title");
        const fallbackMessage = document.getElementById("fallback-message");
        const fallbackCommand = document.getElementById("fallback-command");
        const fallbackHint = document.getElementById("fallback-hint");

        function showFallback(message) {
          window.__MYCALLS_BOOT__.error = message;
          document.documentElement.classList.remove("app-pending");
          document.documentElement.classList.add("app-failed");
          fallback.classList.remove("hidden");
          fallbackTitle.textContent = page.fallbackTitle;
          fallbackMessage.textContent = message;
          fallbackCommand.textContent = page.localServerCommand;
          fallbackCommand.classList.toggle("hidden", !page.localServerCommand);
          fallbackHint.textContent = page.localServerHint;
        }

        if (window.location.protocol === "file:") {
          showFallback(page.fallbackMessage);
          return;
        }

        try {
          window.__MYCALLS_BOOT__.started = true;
          const [{ getLocaleConfig, getStorageKey }, app] = await Promise.all([
            import("../i18n.mjs"),
            import("../app.js"),
          ]);
          app.bootstrapApp({
            locale: page.locale,
            localeConfig: getLocaleConfig(page.locale),
            storageKey: getStorageKey(page.locale),
          });
          window.__MYCALLS_BOOT__.ready = true;
          document.documentElement.classList.remove("app-pending");
          document.documentElement.classList.add("app-ready");
        } catch (error) {
          showFallback(`${page.fallbackPrefix} ${error.message}`);
        }
      })();
    </script>
  </body>
</html>
